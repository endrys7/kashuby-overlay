<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Kashuby Overlay</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{

    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
    font-family:'Orbitron',sans-serif;

}

.overlay{

    position:relative;
    width:100vw;
    height:100vh;

}

.logo{

    position:absolute;

    left:35px;
    top:35px;

    width:170px;

    animation:floatLogo 4s ease-in-out infinite;

    filter:
        drop-shadow(0 0 10px #00d4ff)
        drop-shadow(0 0 25px #00d4ff);

}

.title{

    position:absolute;

    left:225px;
    top:45px;

    color:white;

    font-size:48px;

    font-weight:900;

    text-shadow:

    0 0 8px #00d4ff,
    0 0 20px #00d4ff,
    0 0 40px #00d4ff;

}

.subtitle{

    position:absolute;

    left:228px;
    top:105px;

    color:#00d4ff;

    font-size:26px;

    font-weight:bold;

    letter-spacing:2px;

    text-shadow:

    0 0 10px #00d4ff,
    0 0 25px #00d4ff;

}

@keyframes floatLogo{

0%{

transform:translateY(0px);

}

50%{

transform:translateY(-10px);

}

100%{

transform:translateY(0px);

}

}

</style>

</head>

<body>

<div class="overlay">

<img class="logo" src="logo.png">

<div class="title">

KASHUBY-LATAM

</div>

<div class="subtitle">

10K PARACOINS

</div>

</div>

</body>
</html>
