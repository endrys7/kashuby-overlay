<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<title>Kashuby Overlay</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{

width:100%;
height:100%;
overflow:hidden;
background:transparent;
font-family:'Orbitron',sans-serif;

}

.overlay{

position:relative;
width:100vw;
height:100vh;

}

/* LOGO IZQUIERDO */

.logo1{

position:absolute;

left:30px;
top:25px;

width:170px;

animation:float1 4s ease-in-out infinite;

filter:
drop-shadow(0 0 15px #00d4ff)
drop-shadow(0 0 35px #00d4ff);

}

/* LOGO DERECHO */

.logo2{

position:absolute;

right:30px;
top:25px;

width:170px;

animation:float2 4s ease-in-out infinite;

filter:
drop-shadow(0 0 15px #00d4ff)
drop-shadow(0 0 35px #00d4ff);

}

.center{

position:absolute;

top:50px;

left:50%;

transform:translateX(-50%);

text-align:center;

}

/* TITULO */

.title{

color:white;

font-size:54px;

font-weight:900;

letter-spacing:3px;

text-shadow:

0 0 8px #00d4ff,
0 0 18px #00d4ff,
0 0 40px #00d4ff;

animation:glow 2s infinite alternate;

}

/* SUBTITULO */

.subtitle{

margin-top:12px;

font-size:28px;

font-weight:bold;

color:#00d4ff;

letter-spacing:4px;

text-shadow:

0 0 8px #00d4ff,
0 0 25px #00d4ff;

}

/* ANIMACIONES */

@keyframes glow{

from{

text-shadow:
0 0 10px #00d4ff,
0 0 20px #00d4ff;

}

to{

text-shadow:
0 0 15px white,
0 0 30px #00d4ff,
0 0 60px #00d4ff;

}

}

@keyframes float1{

0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}

}

@keyframes float2{

0%{transform:translateY(-10px);}
50%{transform:translateY(0px);}
100%{transform:translateY(-10px);}

}

</style>

</head>

<body>

<div class="overlay">

<img src="logo.png" class="logo1">

<div class="center">

<div class="title">

KASHUBY-LATAM

</div>

<div class="subtitle">

10K PARACOINS

</div>

</div>

<img src="logo2.png" class="logo2">

</div>

</body>

</html>
